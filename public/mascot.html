<!doctype html>
<html lang="ja">

  <title>Mascot Dev — Pommes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fffdf7;
      font-family: 'IBM Plex Mono', monospace, sans-serif;
      padding: 48px 32px;
    }
    h1 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8b6f47;
      margin-bottom: 40px;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      align-items: flex-end;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8b6f47;
    }
    .size-label {
      font-size: 10px;
      color: #c4a882;
    }

    /* ─── Dark bg swatch ─── */
    .swatch-dark { background: #3d2a0e; padding: 16px; border-radius: 12px; }
  </style>
</head>
